<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gynecologic Oncology Topics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-12 px-4">

    <div class="max-w-lg mx-auto">
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-1">Gynecologic Oncology Topics</h1>
        <p class="text-center text-sm text-slate-500 mb-8">Tap an item to mark it as reviewed</p>

        <div id="checklist" class="flex flex-col gap-3">

            <div class="checklist-item flex items-center gap-4 bg-white border-2 border-slate-200 rounded-xl px-5 py-4 cursor-pointer select-none transition-all hover:-translate-y-0.5 hover:border-blue-300" data-key="ca-endometrium">
                <div class="checkbox w-6 h-6 flex-shrink-0 rounded-md border-2 border-slate-300 flex items-center justify-center transition-all">
                    <svg class="checkmark w-3.5 h-3.5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="item-label font-medium text-slate-700">CA Endometrium</span>
            </div>

            <div class="checklist-item flex items-center gap-4 bg-white border-2 border-slate-200 rounded-xl px-5 py-4 cursor-pointer select-none transition-all hover:-translate-y-0.5 hover:border-blue-300" data-key="ca-cervix">
                <div class="checkbox w-6 h-6 flex-shrink-0 rounded-md border-2 border-slate-300 flex items-center justify-center transition-all">
                    <svg class="checkmark w-3.5 h-3.5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="item-label font-medium text-slate-700">CA Cervix</span>
            </div>

            <div class="checklist-item flex items-center gap-4 bg-white border-2 border-slate-200 rounded-xl px-5 py-4 cursor-pointer select-none transition-all hover:-translate-y-0.5 hover:border-blue-300" data-key="ca-ovary">
                <div class="checkbox w-6 h-6 flex-shrink-0 rounded-md border-2 border-slate-300 flex items-center justify-center transition-all">
                    <svg class="checkmark w-3.5 h-3.5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="item-label font-medium text-slate-700">CA Ovary</span>
            </div>

            <div class="checklist-item flex items-center gap-4 bg-white border-2 border-slate-200 rounded-xl px-5 py-4 cursor-pointer select-none transition-all hover:-translate-y-0.5 hover:border-blue-300" data-key="ca-vulva">
                <div class="checkbox w-6 h-6 flex-shrink-0 rounded-md border-2 border-slate-300 flex items-center justify-center transition-all">
                    <svg class="checkmark w-3.5 h-3.5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="item-label font-medium text-slate-700">CA Vulva</span>
            </div>

            <div class="checklist-item flex items-center gap-4 bg-white border-2 border-slate-200 rounded-xl px-5 py-4 cursor-pointer select-none transition-all hover:-translate-y-0.5 hover:border-blue-300" data-key="gtn">
                <div class="checkbox w-6 h-6 flex-shrink-0 rounded-md border-2 border-slate-300 flex items-center justify-center transition-all">
                    <svg class="checkmark w-3.5 h-3.5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="item-label font-medium text-slate-700">GTN</span>
            </div>

            <div class="checklist-item flex items-center gap-4 bg-white border-2 border-slate-200 rounded-xl px-5 py-4 cursor-pointer select-none transition-all hover:-translate-y-0.5 hover:border-blue-300" data-key="vin">
                <div class="checkbox w-6 h-6 flex-shrink-0 rounded-md border-2 border-slate-300 flex items-center justify-center transition-all">
                    <svg class="checkmark w-3.5 h-3.5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="item-label font-medium text-slate-700">VIN</span>
            </div>

            <div class="checklist-item flex items-center gap-4 bg-white border-2 border-slate-200 rounded-xl px-5 py-4 cursor-pointer select-none transition-all hover:-translate-y-0.5 hover:border-blue-300" data-key="genetic-counseling">
                <div class="checkbox w-6 h-6 flex-shrink-0 rounded-md border-2 border-slate-300 flex items-center justify-center transition-all">
                    <svg class="checkmark w-3.5 h-3.5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="item-label font-medium text-slate-700">Genetic Counseling</span>
            </div>

        </div>

        <p id="progress" class="text-right text-sm text-slate-400 mt-5">0 / 7 reviewed</p>

        <div class="flex justify-end gap-2 mt-3">
            <button onclick="clearAll()" class="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 text-sm font-semibold hover:bg-slate-300 transition-colors">Clear All</button>
            <button onclick="checkAll()" class="px-4 py-2 rounded-lg bg-blue-500 text-white text-sm font-semibold hover:bg-blue-600 transition-colors">Check All</button>
        </div>

        <a href="index.html" class="block text-center mt-10 text-sm text-blue-500 hover:underline">← Back to Home</a>
    </div>

    <script>
        const STORAGE_KEY = 'gynonco-checklist';

        function loadState() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
            catch { return {}; }
        }

        function saveState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function setChecked(item, checked) {
            const checkbox = item.querySelector('.checkbox');
            const checkmark = item.querySelector('.checkmark');
            const label = item.querySelector('.item-label');

            if (checked) {
                item.classList.replace('border-slate-200', 'border-green-400');
                item.classList.add('bg-green-50');
                checkbox.classList.replace('border-slate-300', 'border-green-500');
                checkbox.classList.add('bg-green-500');
                checkmark.classList.remove('hidden');
                label.classList.replace('text-slate-700', 'text-green-700');
                label.classList.add('line-through', 'decoration-green-300');
            } else {
                item.classList.replace('border-green-400', 'border-slate-200');
                item.classList.remove('bg-green-50');
                checkbox.classList.replace('border-green-500', 'border-slate-300');
                checkbox.classList.remove('bg-green-500');
                checkmark.classList.add('hidden');
                label.classList.replace('text-green-700', 'text-slate-700');
                label.classList.remove('line-through', 'decoration-green-300');
            }
        }

        function updateProgress() {
            const total = document.querySelectorAll('.checklist-item').length;
            const checked = document.querySelectorAll('.checklist-item.bg-green-50').length;
            document.getElementById('progress').textContent = `${checked} / ${total} reviewed`;
        }

        document.querySelectorAll('.checklist-item').forEach(item => {
            item.addEventListener('click', () => {
                const isChecked = item.classList.contains('bg-green-50');
                setChecked(item, !isChecked);
                const state = loadState();
                state[item.dataset.key] = !isChecked;
                saveState(state);
                updateProgress();
            });
        });

        function checkAll() {
            const state = {};
            document.querySelectorAll('.checklist-item').forEach(item => {
                setChecked(item, true);
                state[item.dataset.key] = true;
            });
            saveState(state);
            updateProgress();
        }

        function clearAll() {
            document.querySelectorAll('.checklist-item').forEach(item => setChecked(item, false));
            saveState({});
            updateProgress();
        }

        // Restore persisted state
        const state = loadState();
        document.querySelectorAll('.checklist-item').forEach(item => {
            if (state[item.dataset.key]) setChecked(item, true);
        });
        updateProgress();
    </script>
</body>
</html>
